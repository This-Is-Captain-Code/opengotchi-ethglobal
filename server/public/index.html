<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>opengotchi · onchain pets</title>
<style>
  :root { --bg:#0d1017; --card:#161b26; --line:#283143; --txt:#e6edf3; --dim:#8b97a7;
          --grn:#22dd66; --red:#ff5b5b; --yel:#ffd23f; --cy:#35b6ff; --sel:#1c4e84; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.5 ui-monospace,Menlo,Consolas,monospace; }
  header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; letter-spacing:.5px; }
  .pill { font-size:11px; padding:2px 8px; border:1px solid var(--line); border-radius:99px; color:var(--dim); }
  main { max-width:920px; margin:0 auto; padding:20px; display:grid; gap:20px; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .card h2 { margin:0 0 4px; font-size:16px; display:flex; align-items:center; gap:8px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--red); box-shadow:0 0 8px var(--red); }
  .dot.on { background:var(--grn); box-shadow:0 0 8px var(--grn); }
  .kv { color:var(--dim); font-size:12px; margin-top:8px; word-break:break-all; }
  .kv b { color:var(--txt); font-weight:600; }
  a { color:var(--cy); text-decoration:none; } a:hover { text-decoration:underline; }
  .bars { margin-top:10px; display:grid; gap:5px; }
  .bar { display:grid; grid-template-columns:54px 1fr 34px; gap:6px; align-items:center; font-size:11px; color:var(--dim); }
  .track { height:9px; background:#0c0f16; border-radius:6px; overflow:hidden; }
  .fill { height:100%; background:var(--grn); }
  form { display:grid; grid-template-columns:auto 1fr auto auto; gap:8px; align-items:center; }
  select,input,button { background:#0c0f16; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; }
  button { background:var(--sel); border-color:var(--sel); cursor:pointer; font-weight:600; }
  button:disabled { opacity:.5; cursor:default; }
  .result { margin-top:10px; font-size:12px; min-height:16px; }
  .ok { color:var(--grn); } .err { color:var(--red); }
  ul.events { list-style:none; margin:0; padding:0; display:grid; gap:6px; }
  ul.events li { font-size:12px; padding:8px 10px; background:#0c0f16; border:1px solid var(--line); border-radius:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .badge { font-size:10px; padding:1px 6px; border-radius:99px; border:1px solid var(--line); color:var(--dim); }
  .badge.react { color:var(--yel); border-color:var(--yel); }
  .muted { color:var(--dim); }
  @media (max-width:680px){ .row{grid-template-columns:1fr} form{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<header>
  <h1>🐾 opengotchi · onchain pets</h1>
  <span class="pill" id="provider">wallet: …</span>
  <span class="pill" id="broker">broker: …</span>
  <span class="pill">Base Sepolia</span>
</header>
<main>
  <div class="row" id="devices"></div>

  <div class="card">
    <h2>💸 Send a payment</h2>
    <form id="payForm">
      <select id="from"></select>
      <input id="to" placeholder="recipient ENS or 0x…" />
      <input id="amount" value="0.001" size="6" />
      <button id="payBtn" type="submit">Pay</button>
    </form>
    <div class="result" id="payResult"></div>
  </div>

  <div class="card" id="depositCard" hidden>
    <h2>💵 Deposit USDC <span class="muted" style="font-weight:400">via Blink</span></h2>
    <div class="kv" style="margin-top:0">Fund a pet's wallet with USDC on Base — paid by passkey, no seed phrase.</div>
    <form id="depForm">
      <select id="depDevice"></select>
      <input id="depAmount" value="1" size="5" /><span class="muted">USD</span>
      <button id="depBtn" type="submit">Deposit</button>
    </form>
    <div class="result" id="depResult"></div>
  </div>

  <div class="card">
    <h2>📜 Activity</h2>
    <ul class="events" id="events"><li class="muted">no activity yet</li></ul>
  </div>
</main>

<script>
const EXPLORER = 'https://sepolia.basescan.org';
const short = (s) => s ? s.slice(0,6) + '…' + s.slice(-4) : '—';
const fmtBal = (b) => b == null ? '—' : (Math.round(parseFloat(b)*1e5)/1e5) + ' ETH';
const ago = (t) => { const s = Math.round((Date.now()-t)/1000); return s<60?s+'s':Math.round(s/60)+'m'; };
const STATS = [['feed_index','HUNGRY'],['sleep_index','SLEEP'],['pet_index','HAPPY'],['clean_index','CLEAN']];

function deviceCard(d) {
  const tel = d.lastTelemetry || {};
  const bars = STATS.map(([k,label]) => {
    const v = Math.max(0, Math.min(100, Math.round(tel[k] ?? 0)));
    return `<div class="bar"><span>${label}</span><div class="track"><div class="fill" style="width:${v}%"></div></div><span>${v}%</span></div>`;
  }).join('');
  const p = d.ensProfile;
  const resolves = p && p.address && d.wallet && p.address.toLowerCase() === d.wallet.toLowerCase();
  const ensLine = p
    ? `ENS: <a href="https://sepolia.app.ens.domains/${d.ens}" target="_blank">${d.ens}</a> <span class="badge react">agent ✓</span>${resolves ? ' <span class="muted">→ resolves to wallet ✓</span>' : ''}`
    : `ENS: <b>${d.ens || '—'}</b> <span class="muted">(not registered yet)</span>`;
  const ctx = p && p.agentContext ? `<div class="kv muted">“${p.agentContext.slice(0,100)}”</div>` : '';
  return `<div class="card">
    <h2><span class="dot ${d.online?'on':''}"></span>${d.label}</h2>
    <div class="kv">${ensLine}</div>
    ${ctx}
    <div class="kv">wallet: ${d.wallet ? `<a href="${EXPLORER}/address/${d.wallet}" target="_blank">${short(d.wallet)}</a>` : '—'} &nbsp; bal: <b>${fmtBal(d.balance)}</b></div>
    <div class="bars">${bars}</div>
  </div>`;
}

function eventRow(e) {
  const when = `<span class="muted">${ago(e.ts)} ago</span>`;
  if (!e.ok) return `<li>${when} ❌ <b>${e.from}</b> → ${e.to} <span class="err">${e.error||'failed'}</span></li>`;
  const tx = e.tx ? `<a href="${EXPLORER}/tx/${e.tx}" target="_blank">${short(e.tx)}</a>` : '';
  const react = e.reacted ? `<span class="badge react">fed ${e.reacted} 🍔</span>` : '';
  return `<li>${when} 💸 <b>${e.from}</b> → ${e.to} <b>${e.amount}</b> ${tx} <span class="badge">${e.source}</span> ${react}</li>`;
}

async function refresh() {
  try {
    const s = await (await fetch('/state')).json();
    window.__og = s; // shared with the Blink deposit module below
    document.getElementById('provider').textContent = 'wallet: ' + s.walletProvider;
    document.getElementById('broker').textContent = 'broker: ' + s.broker.replace('mqtt://','');
    document.getElementById('devices').innerHTML = s.devices.map(deviceCard).join('');
    const from = document.getElementById('from');
    if (from.options.length !== s.devices.length) {
      from.innerHTML = s.devices.map(d => `<option value="${d.label}">from ${d.label}</option>`).join('');
    }
    const ev = document.getElementById('events');
    ev.innerHTML = s.events.length ? s.events.map(eventRow).join('') : '<li class="muted">no activity yet</li>';
    // Blink deposit: show the card only when the server has a Blink merchant key.
    const depCard = document.getElementById('depositCard');
    const depDev = document.getElementById('depDevice');
    const fundable = s.devices.filter(d => d.wallet);
    if (s.blink && s.blink.configured && fundable.length) {
      depCard.hidden = false;
      if (depDev.options.length !== fundable.length) {
        depDev.innerHTML = fundable.map(d => `<option value="${d.wallet}">${d.label} (${short(d.wallet)})</option>`).join('');
      }
    } else {
      depCard.hidden = true;
    }
  } catch (e) { /* server restarting */ }
}

document.getElementById('payForm').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById('payBtn');
  const out = document.getElementById('payResult');
  const body = {
    from: document.getElementById('from').value,
    to: document.getElementById('to').value.trim(),
    amount: document.getElementById('amount').value.trim(),
  };
  if (!body.to) { out.className='result err'; out.textContent='enter a recipient'; return; }
  btn.disabled = true; out.className='result muted'; out.textContent='sending…';
  try {
    const r = await (await fetch('/pay', { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body) })).json();
    if (r.ok) { out.className='result ok'; out.innerHTML = `paid ✓ <a href="${EXPLORER}/tx/${r.txHash}" target="_blank">${short(r.txHash)}</a>`; }
    else { out.className='result err'; out.textContent = 'failed: ' + (r.error||'unknown'); }
  } catch (e) { out.className='result err'; out.textContent = 'error: ' + e.message; }
  btn.disabled = false; refresh();
});

refresh();
setInterval(refresh, 2000);
</script>

<script type="module">
// Blink deposit — passkey-funded USDC. The SDK POSTs our /blink/sign signer,
// then opens Blink's hosted iframe so the user completes the deposit by passkey.
const USDC_BASE = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'; // USDC on Base
const CHAIN_ID = 8453; // Base mainnet
let deposit = null; // lazily created on first use (SDK loaded from CDN)

async function getDeposit() {
  if (deposit) return deposit;
  const env = (window.__og && window.__og.blink && window.__og.blink.environment) || 'production';
  const mod = await import('https://esm.sh/@swype-org/deposit');
  deposit = new mod.Deposit({ signer: '/blink/sign', environment: env });
  return deposit;
}

const depForm = document.getElementById('depForm');
if (depForm) depForm.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById('depBtn');
  const out = document.getElementById('depResult');
  const address = document.getElementById('depDevice').value;
  const amount = parseFloat(document.getElementById('depAmount').value);
  if (!address) { out.className = 'result err'; out.textContent = 'pick a pet wallet'; return; }
  if (!(amount > 0)) { out.className = 'result err'; out.textContent = 'enter an amount'; return; }
  btn.disabled = true; out.className = 'result muted'; out.textContent = 'opening Blink…';
  try {
    const d = await getDeposit();
    const res = await d.requestDeposit({ amount, chainId: CHAIN_ID, address, token: USDC_BASE });
    out.className = 'result ok';
    out.textContent = 'deposit ' + (res && res.status ? res.status : 'completed') + ' ✓';
    if (window.refresh) window.refresh();
  } catch (e) {
    out.className = 'result err';
    out.textContent = 'deposit failed: ' + (e && e.message ? e.message : String(e));
  }
  btn.disabled = false;
});
</script>
</body>
</html>
